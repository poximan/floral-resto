<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ruta no disponible</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: sans-serif;
        background: #fff8f2;
        color: #2b1a11;
      }

      main {
        width: min(520px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid rgba(43, 26, 17, 0.12);
        border-radius: 24px;
        background: #fffdfa;
        box-shadow: 0 24px 70px rgba(43, 26, 17, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ruta no disponible</h1>
      <p>La entrada publica esta activa, pero esta ruta no esta asignada a ningun servicio.</p>
    </main>
  </body>
</html>
