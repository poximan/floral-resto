events {}

http {
  log_format edge_json escape=json
    '{"time":"$time_iso8601",'
    '"remoteAddr":"$remote_addr",'
    '"forwardedFor":"$http_x_forwarded_for",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"query":"$args",'
    '"status":"$status",'
    '"requestTime":"$request_time",'
    '"bytesSent":"$bytes_sent",'
    '"protocol":"$server_protocol",'
    '"upgrade":"$http_upgrade",'
    '"referer":"$http_referer",'
    '"userAgent":"$http_user_agent"}';

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=5s ipv6=off;
    error_page 404 /not-found-public.html;

    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location = /not-found-public.html {
      root /usr/share/nginx/html;
      internal;
    }

    location = / {
      mirror /__admin_access_event;
      mirror_request_body off;
      return 302 /carta$is_args$args;
    }

    location ^~ /admin {
      set $admin_dashboard_upstream admin-dashboard:8084;
      proxy_pass http://$admin_dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/(carta|gestion)(/.*)?$ {
      mirror /__admin_access_event;
      mirror_request_body off;
      set $resto_server_upstream web-server:80;
      proxy_pass http://$resto_server_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /api/ {
      mirror /__admin_access_event;
      mirror_request_body off;
      set $resto_server_upstream web-server:80;
      proxy_pass http://$resto_server_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /assets/ {
      mirror /__admin_access_event;
      mirror_request_body off;
      set $resto_server_upstream web-server:80;
      proxy_pass http://$resto_server_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      return 404;
    }

    location = /__admin_access_event {
      internal;
      set $admin_dashboard_upstream admin-dashboard:8084;
      proxy_pass http://$admin_dashboard_upstream/internal/access-event;
      proxy_method POST;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Edge-Time $time_iso8601;
      proxy_set_header X-Edge-Remote-Addr $remote_addr;
      proxy_set_header X-Edge-Forwarded-For $http_x_forwarded_for;
      proxy_set_header X-Edge-Method $request_method;
      proxy_set_header X-Edge-Path $uri;
      proxy_set_header X-Edge-Query $args;
      proxy_set_header X-Edge-Status $status;
      proxy_set_header X-Edge-Request-Time $request_time;
      proxy_set_header X-Edge-Protocol $server_protocol;
      proxy_set_header X-Edge-Upgrade $http_upgrade;
      proxy_set_header X-Edge-Referer $http_referer;
      proxy_set_header X-Edge-User-Agent $http_user_agent;
    }
  }
}
