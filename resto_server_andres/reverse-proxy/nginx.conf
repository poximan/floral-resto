map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  error_page 404 /not-found-public.html;

  location = /not-found-public.html {
    internal;
  }

  location = / {
    return 302 /carta$is_args$args;
  }

  location = /carta {
    try_files /web-carta/index.html =404;
  }

  location = /carta/ {
    return 302 /carta$is_args$args;
  }

  location /api/ {
    proxy_pass http://http-gw:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location /assets/menu/ {
    proxy_pass http://http-gw:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /carta/assets/ {
    alias /usr/share/nginx/html/web-carta/assets/;
  }

  location = /gestion {
    try_files /web-gestion/index.html =404;
  }

  location = /gestion/ {
    return 302 /gestion$is_args$args;
  }

  location /gestion/assets/ {
    alias /usr/share/nginx/html/web-gestion/assets/;
  }

  location / {
    return 404;
  }
}

server {
  listen 81;
  server_name _;
  root /usr/share/nginx/html;
  error_page 404 /not-found-gestion.html;

  location = /not-found-gestion.html {
    internal;
  }

  location = / {
    return 302 /gestion$is_args$args;
  }

  location = /gestion {
    try_files /web-gestion/index.html =404;
  }

  location = /gestion/ {
    return 302 /gestion$is_args$args;
  }

  location /api/ {
    proxy_pass http://http-gw:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location /assets/menu/ {
    proxy_pass http://http-gw:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /gestion/assets/ {
    alias /usr/share/nginx/html/web-gestion/assets/;
  }

  location / {
    return 404;
  }
}
