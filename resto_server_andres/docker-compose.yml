services:
  postgres:
    image: postgres:16-alpine
    container_name: restobar-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  domain:
    build:
      context: ./domain
    container_name: restobar-domain
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  http-gw:
    build:
      context: ./http-gw
    container_name: restobar-http-gw
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - domain
    ports:
      - "${HTTP_GW_HOST_PORT}:${HTTP_GW_PORT}"
    volumes:
      - ./assets:/app/assets:ro

  reverse-proxy:
    build:
      context: ./reverse-proxy
      dockerfile: Dockerfile
    container_name: restobar-reverse-proxy
    restart: unless-stopped
    depends_on:
      - http-gw
    ports:
      - "${WEB_CARTA_PORT}:80"
      - "${WEB_GESTION_PORT}:81"

  mqtt-client:
    build:
      context: ./mqtt-client
    container_name: restobar-mqtt-client
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      domain:
        condition: service_started
      tunel-service:
        condition: service_started

  tunel-service:
    build:
      context: ./tunel-service
    container_name: restobar-tunel-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - reverse-proxy

volumes:
  postgres_data:
