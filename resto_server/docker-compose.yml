services:
  postgres:
    image: postgres:16-alpine
    container_name: restobar-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/config/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./postgres/datos:/postgres-datos:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  postgres-data-loader:
    image: postgres:16-alpine
    container_name: restobar-postgres-data-loader
    restart: "no"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      CSV_DATA_DIR: /postgres-datos
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./postgres/config:/postgres-config:ro
      - ./postgres/datos:/postgres-datos:ro
      - postgres_dataloader:/var/lib/postgresql/data
    command: ["sh", "/postgres-config/002_seed_csv.sh"]

  domain:
    build:
      context: ./domain
    container_name: restobar-domain
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres-data-loader:
        condition: service_completed_successfully

  http-gw:
    build:
      context: ./http-gw
    container_name: restobar-http-gw
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - domain
    ports:
      - "${HTTP_GW_HOST_PORT}:${HTTP_GW_PORT}"
    volumes:
      - ./assets:/app/assets:ro
    networks:
      - default
      - restobar_edge

  web-server:
    build:
      context: ./web-server
      dockerfile: Dockerfile
    container_name: restobar-web-server
    restart: unless-stopped
    depends_on:
      - http-gw
    ports:
      - "${WEB_CARTA_PORT}:80"
      - "${WEB_GESTION_PORT}:81"
    networks:
      - default
      - restobar_edge

  mqtt-client:
    build:
      context: ./mqtt-client
    container_name: restobar-mqtt-client
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      domain:
        condition: service_started
    networks:
      - default
      - restobar_edge

volumes:
  postgres_data:
  postgres_dataloader:

networks:
  restobar_edge:
    external: true
    name: restobar_edge
